<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conscious Family Center | Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="bubbleCanvas"></canvas>

    <header>
        <div class="logo-container">
            <img src="assets/logo.png" alt="Conscious Family Center Logo" class="logo-img">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="programs.html">Programs</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main class="page-padding">
        <section class="contact-container">
            <div class="section-title">
                <h1>Connect With Us</h1>
                <p>Have questions about admission sequences or program registries? Send us a digital note.</p>
                <div class="title-underline"></div>
            </div>

            <div class="contact-layout">
                <form class="contact-form" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="john@example.com">
                    </div>
                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" rows="6" required placeholder="Tell us about your family context..."></textarea>
                    </div>
                    <button type="submit" class="submit-button">Send Secure Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Conscious Family Center. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
